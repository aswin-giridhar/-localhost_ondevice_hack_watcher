# Watcher configuration — all local, no cloud.

server:
  host: "0.0.0.0"        # bind to LAN so the phone can reach it
  port: 8000
  # HTTPS is required for phone/tablet cameras (mobile browsers block camera access
  # on plain http). A self-signed cert is auto-generated on first run; accept the
  # browser warning on each device. Set false for laptop-only (http) testing.
  https: true
  certfile: "data/certs/cert.pem"
  keyfile: "data/certs/key.pem"

capture:
  # source:
  #   "stream" waits for phone(s) to push frames over /ws/ingest (multi-camera).
  #   "webcam" uses a local camera index (laptop-only testing).
  #   "demo"   synthesizes a changing scene so the dashboard shows activity with
  #            no camera at all (great for a quick check or a no-hardware fallback).
  source: "stream"        # "stream" | "webcam" | "demo"
  webcam_index: 0
  target_fps: 5           # frames pulled per camera for change detection (lower = lighter)
  zone: "desk"            # default zone label tagged onto observations
  # Use THIS laptop's built-in camera as a node too, alongside any phones/tablets
  # streaming in. With all three devices this gives you a 3-camera shared graph.
  local_webcam: true
  webcam_zone: "laptop"   # zone label for the laptop camera

change_detector:
  # Cheap, always-on gate. The heavy VLM only fires when change > threshold.
  min_area: 2500          # min changed-pixel area (px); higher = fewer trivial triggers
  threshold: 30           # per-pixel diff threshold (0-255); higher = less noise-sensitive
  debounce_seconds: 4.0   # min gap between VLM triggers per camera (higher = lighter GPU load)
  warmup_frames: 15       # frames to learn the background before reacting

perception:
  backend: "ollama"       # "ollama" | "mock"
  # A single VLM that can both see AND reason keeps us under 4GB VRAM.
  vlm_model: "qwen3-vl:2b"
  # Optional separate reasoner. Leave blank to let the VLM also decide.
  reasoner_model: "phi4-mini"
  request_timeout: 60

memory:
  backend: "networkx"     # "networkx" (reliable, local) | "cognee" (optional)
  db_path: "data/watcher_graph.sqlite"
  recent_window: 20       # how many recent observations the reasoner sees (GraphRAG)
  transfer_window_seconds: 30.0  # if an object leaves one camera and reappears in
                                 # another within this window, it's reported as a MOVE

trust:
  # Captur-style on-device photo-trust gate. Validates a frame is a genuine,
  # usable capture before the agent reasons about it. Fully offline.
  enabled: true
  min_blur: 40.0          # min Laplacian variance; below = too blurry / no detail
  min_brightness: 25      # reject near-black frames
  max_brightness: 235     # reject blown-out / white frames

narrator:
  enabled: true
  tts: false              # set true to speak via pyttsx3; on-screen text always shown

tracer:
  path: "traces/decisions.jsonl"   # Overmind-style decision traces
